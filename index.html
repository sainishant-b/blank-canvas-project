<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#000000" />
    
    <!-- iOS Meta Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AI Productivity" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- iOS Splash Screens (optional - for PWA) -->
    <link rel="icon" href="/favicon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>AI Productivity Companion</title>
    <meta name="description" content="A focus-first productivity app that strips away the noise. One task, one button, zero friction." />
    <meta name="author" content="AI Productivity" />

    <meta property="og:title" content="AI Productivity — One task. One button. Zero friction." />
    <meta property="og:description" content="A focus-first productivity app built for ADHD minds. See your most important task, start a timer, and get to work." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/favicon.svg" />

    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="AI Productivity — One task. One button. Zero friction." />
    <meta name="twitter:description" content="A focus-first productivity app built for ADHD minds." />
    <meta name="twitter:image" content="/favicon.svg" />
    <style>
      /* Safe area CSS for Android/iOS status bar */
      :root {
        --sat: env(safe-area-inset-top, 0px);
        --sab: env(safe-area-inset-bottom, 0px);
        --sal: env(safe-area-inset-left, 0px);
        --sar: env(safe-area-inset-right, 0px);
      }
      
      /* Prevent rubber-banding on iOS */
      html, body {
        overscroll-behavior: none;
        -webkit-overflow-scrolling: touch;
      }
      
      /* Ensure proper rendering on iOS */
      * {
        -webkit-tap-highlight-color: transparent;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
